<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fastpath.se</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --accent-color: #495057;
            --link-color: #0d6efd;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #212529;
                --text-color: #f8f9fa;
                --accent-color: #adb5bd;
                --link-color: #6ea8fe;
                --card-bg: #343a40;
                --border-color: #495057;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 2rem;
            margin: 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p.tagline {
            color: var(--accent-color);
            font-size: 1.2rem;
        }

        .card {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 1.5rem;
            margin-top: 0;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin-bottom: 1rem;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        footer {
            text-align: center;
            color: var(--accent-color);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <img src="logos/logo.png" alt="fastpath.se" style="max-width: 100%; height: auto;">
            <p class="tagline">Fastpath your development</p>
        </header>

        <main>
            <section class="card">
                <h2>About</h2>
                <p>This site is under construction... check back later!</p>
            </section>

            <section class="card">
                <h2>Connect</h2>
                <ul>
                    <li>📧 <a href="mailto:contact@fastpath.se">Email Us</a></li>
                    <li>🐙 <a href="https://fastpath-sr.github.com" target="_blank" rel="noopener">GitHub</a></li>
                </ul>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Fastpath.se. Built with HTML & CSS.</p>
        </footer>
    </div>

</body>

</html>
